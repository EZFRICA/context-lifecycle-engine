name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # The suite uses deterministic stub fingerprinters internally — no real
      # model, no API key, no network.
      - name: Run pytest
        run: uv run pytest

      # Smoke-test the whole lifecycle loop OFFLINE with fictional (stub)
      # substrates, so CI never calls a real model. Real Gemini is used only
      # for local runs (see examples/full_loop.sh).
      - name: Full-loop smoke (offline, stub models)
        env:
          CLE_MODEL_A: stub-model-a
          CLE_MODEL_B: stub-model-b
        run: bash examples/full_loop.sh
